services:
  db:
    image: postgres:16
    container_name: dcam-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dcam
      POSTGRES_USER: dcam
      POSTGRES_PASSWORD: dcam_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U dcam -d dcam
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ghcr.io/christianrobertson36/dcam-api:v33
    container_name: dcam-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5055
      DATABASE_URL: postgres://dcam:dcam_password@db:5432/dcam
      JWT_SECRET: local_dev_secret_change_later
      SEED_ADMIN_EMAIL: admin@dcam.local
      SEED_ADMIN_PASSWORD: ChangeMe123!
      SEED_ADMIN_NAME: DCAM Super Admin
    ports:
      - "5056:5055"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5056
    image: ghcr.io/christianrobertson36/dcam-web:v33
    container_name: dcam-web
    restart: unless-stopped
    ports:
      - "3096:80"
    depends_on:
      - api
