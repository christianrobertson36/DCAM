version: "3.9"

services:
  db:
    image: postgres:16
    container_name: dcam-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dcam
      POSTGRES_USER: dcam
      POSTGRES_PASSWORD: dcam_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcam -d dcam"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    image: dcam-api:v1
    container_name: dcam-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5055
      DATABASE_URL: postgres://dcam:dcam_password@db:5432/dcam
      JWT_SECRET: change_this_in_production
    ports:
      - "5055:5055"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  web:
    build:
      context: ./frontend
    image: dcam-web:v1
    container_name: dcam-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5055
    ports:
      - "3095:80"
    depends_on:
      - api
